<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini-Stream</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎬</text></svg>" />
</head>
<body>
  <!-- Decorative background orbs -->
  <div class="orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <div id="toasts" class="toasts"></div>

  <!-- Auth screen -->
  <div id="auth-screen" class="screen center hidden">
    <form id="auth-form" class="card auth-card">
      <div class="logo">🎬 Mini-Stream</div>
      <p id="auth-subtitle" class="muted"></p>
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
      <input type="password" id="auth-password2" class="hidden" placeholder="Ulangi password" autocomplete="new-password" />
      <button type="submit" id="auth-submit">Masuk</button>
      <p id="auth-error" class="error hidden"></p>
    </form>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="brand" data-nav="home">🎬 Mini-Stream</div>
      <input type="search" id="search" placeholder="Cari film…" />
      <nav>
        <button class="nav-btn" data-nav="home">Film</button>
        <button class="nav-btn" data-nav="settings">Pengaturan</button>
        <button class="nav-btn ghost" id="logout-btn">Keluar</button>
      </nav>
    </header>

    <!-- Home / grid -->
    <main id="view-home" class="view">
      <section id="hero" class="hero hidden">
        <div class="hero-text">
          <h1>Koleksi Film</h1>
          <p id="hero-sub" class="muted"></p>
        </div>
        <div id="stats" class="stats"></div>
      </section>
      <div id="filters" class="filters"></div>
      <div id="empty-state" class="empty hidden">
        <p>Belum ada film. Tambahkan folder di <a href="#" data-nav="settings">Pengaturan</a>.</p>
      </div>
      <div id="grid" class="grid"></div>
    </main>

    <!-- Settings -->
    <main id="view-settings" class="view hidden">
      <h2>Folder Perpustakaan</h2>
      <ul id="lib-list" class="lib-list"></ul>
      <div class="add-lib">
        <input type="text" id="lib-input" placeholder="/path/ke/folder/film" />
        <button id="browse-btn" class="ghost">Telusuri…</button>
        <button id="add-lib-btn">Tambah</button>
      </div>
      <p id="lib-msg" class="muted"></p>

      <!-- Folder browser -->
      <div id="fs-browser" class="fs-browser hidden">
        <div class="fs-head">
          <span id="fs-current" class="mono"></span>
          <button id="fs-close" class="ghost small">Tutup</button>
        </div>
        <ul id="fs-list" class="fs-list"></ul>
        <button id="fs-pick" class="small">Pilih folder ini</button>
      </div>
    </main>
  </div>

  <!-- Series modal (daftar episode) -->
  <div id="series-modal" class="modal hidden">
    <div class="modal-inner series-inner">
      <button id="series-close" class="modal-close">✕</button>
      <div class="series-head">
        <img id="series-poster" class="series-poster" alt="" />
        <div>
          <h2 id="series-title"></h2>
          <p id="series-meta" class="muted"></p>
        </div>
      </div>
      <ul id="episode-list" class="episode-list"></ul>
    </div>
  </div>

  <!-- Player modal -->
  <div id="player-modal" class="modal hidden">
    <div class="modal-inner">
      <button id="player-close" class="modal-close">✕</button>
      <video id="player" controls autoplay playsinline></video>
      <h3 id="player-title"></h3>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
